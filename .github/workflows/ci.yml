name: CI

on:
  push:
  pull_request:

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: TypeScript check
        run: npx tsc --noEmit

  build:
    name: Next.js Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create env file
        run: cp .env.example .env.local

      - name: Build
        run: npm run build

  docker:
    name: Docker Stack
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create env file
        run: cp .env.example .env.local

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Build app image
        run: docker compose build app

      - name: Start stack
        run: docker compose up -d

      - name: Wait for Next.js app
        run: |
          echo "Waiting for Next.js on :3000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "App is up (attempt $i)"
              break
            fi
            sleep 3
          done
          curl -sf http://localhost:3000 || { echo "App did not respond in time"; exit 1; }

      - name: Check MinIO web UI
        run: |
          echo "Checking MinIO console on :9001..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:9001 > /dev/null 2>&1; then
              echo "MinIO console is up (attempt $i)"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:9001 || { echo "MinIO console did not respond"; exit 1; }

      - name: Check Postgres
        run: docker compose exec -T postgres pg_isready -U studyroom

      - name: Check Redis
        run: docker compose exec -T redis redis-cli ping

      - name: Service status
        if: always()
        run: docker compose ps

      - name: Logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
