name: Release

on:
  push:
    tags:
      - "v*.*.*"

defaults:
  run:
    working-directory: modular-lms-scaffold

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      app_image: ${{ steps.vars.outputs.app_image }}
      migrator_image: ${{ steps.vars.outputs.migrator_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create env file
        run: cp .env.example .env.local

      - name: Compute image names
        id: vars
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "app_image=${{ env.REGISTRY }}/${OWNER_LOWER}/studyroom" >> "$GITHUB_OUTPUT"
          echo "migrator_image=${{ env.REGISTRY }}/${OWNER_LOWER}/studyroom-migrator" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (app image)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.app_image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: modular-lms-scaffold
          target: runner
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (migrator image)
        id: meta-migrator
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.migrator_image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build & push migrator image
        uses: docker/build-push-action@v6
        with:
          context: modular-lms-scaffold
          target: migrator
          push: true
          tags: ${{ steps.meta-migrator.outputs.tags }}
          labels: ${{ steps.meta-migrator.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Docker image tags follow semver without the `v` git tags use (e.g. `1.2.3`, not `v1.2.3`)
      - name: Compute image version
        id: vars
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Images

            - `docker pull ${{ needs.build-and-push.outputs.app_image }}:${{ steps.vars.outputs.version }}`
            - `docker pull ${{ needs.build-and-push.outputs.migrator_image }}:${{ steps.vars.outputs.version }}`

            Also tagged as `latest`. See [package listing](https://github.com/${{ github.repository_owner }}?tab=packages&repo_name=${{ github.event.repository.name }}) for all versions.

            ## Quickstart

            ```bash
            cp .env.example .env.local
            IMAGE_TAG=${{ steps.vars.outputs.version }} docker compose up
            ```
